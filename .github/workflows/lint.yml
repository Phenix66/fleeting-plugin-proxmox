name: lint

on:
  push:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  check-licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: make check-licenses
